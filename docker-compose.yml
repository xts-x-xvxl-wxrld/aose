services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: agentic-ose-api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      AUTH_MODE: ${AUTH_MODE:-fake}
      OPENAI_AGENT_MODEL: ${OPENAI_AGENT_MODEL:-gpt-5.4-mini}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://agentic:agentic@postgres:5432/agentic_ose}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-agentic_ose}
      POSTGRES_USER: ${POSTGRES_USER:-agentic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
      FAKE_AUTH_ENABLED: ${FAKE_AUTH_ENABLED:-true}
      ZITADEL_ISSUER: ${ZITADEL_ISSUER:-}
      ZITADEL_AUDIENCE: ${ZITADEL_AUDIENCE:-}
      ZITADEL_JWKS_URI: ${ZITADEL_JWKS_URI:-}
      ZITADEL_JWT_ALGORITHMS: ${ZITADEL_JWT_ALGORITHMS:-RS256}
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn app.main:app --app-dir src --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/healthz').read()
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: test
    profiles:
      - dev
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      AUTH_MODE: fake
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://agentic:agentic@postgres:5432/agentic_ose}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-postgresql+psycopg://agentic:agentic@postgres:5432/agentic_ose_test}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-agentic_ose}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-agentic_ose_test}
      POSTGRES_USER: ${POSTGRES_USER:-agentic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
      FAKE_AUTH_ENABLED: true
      ZITADEL_ISSUER: ${ZITADEL_ISSUER:-}
      ZITADEL_AUDIENCE: ${ZITADEL_AUDIENCE:-}
      ZITADEL_JWKS_URI: ${ZITADEL_JWKS_URI:-}
      ZITADEL_JWT_ALGORITHMS: ${ZITADEL_JWT_ALGORITHMS:-RS256}
    ports:
      - "8001:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./docs:/app/docs
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./backend/pyproject.toml:/app/pyproject.toml
    command:
      - sh
      - -c
      - alembic upgrade head && uvicorn app.main:app --app-dir src --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/healthz').read()
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-ose-frontend
    environment:
      PORT: ${FRONTEND_PORT:-5173}
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-http://api:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: agentic-ose-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentic_ose}
      POSTGRES_TEST_DB: ${POSTGRES_TEST_DB:-agentic_ose_test}
      POSTGRES_USER: ${POSTGRES_USER:-agentic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentic}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentic} -d ${POSTGRES_DB:-agentic_ose}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  frontend_node_modules:
  postgres_data:
